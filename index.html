
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RBX Market</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>RBX MARKET</h1>
  <button onclick="openLogin()">Đăng nhập</button>
</header>

<section class="hero">
  <h2>Shop Acc Roblox Auto</h2>
  <p>Tự động giao acc sau khi mua</p>
</section>

<section class="products">

<div class="card">
  <h3>Acc Blox Fruit VIP</h3>
  <p>Max Level - Full Gamepass</p>
  <span>299.000đ</span>
  <button onclick="buyAccount('rbxvip01','pass123')">Mua ngay</button>
</div>

<div class="card">
  <h3>Acc Anime Adventures</h3>
  <p>Nhiều nhân vật hiếm</p>
  <span>499.000đ</span>
  <button onclick="buyAccount('animevip01','pass456')">Mua ngay</button>
</div>

</section>

<div class="modal" id="loginModal">
  <div class="modal-box">
    <h2>Đăng nhập</h2>
    <input type="text" placeholder="Tên tài khoản">
    <input type="password" placeholder="Mật khẩu">
    <button onclick="closeLogin()">Đăng nhập</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
